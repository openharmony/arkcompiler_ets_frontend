whitelist:
- name: "allow_xts"
  paths:
  - ".*/xts/acts/.*"
  - ".*/test/xts/.*"
  - ".*/ability/ability_runtime/.*"
  - ".*/window/window_manager/.*"
  - ".*/arkui/ace_engine/.*"
  - ".*/generated/.*"

- name: "allow_implicit_export"
  paths:
  - ".*/ets/static/api/.*"
  - ".*/ets/static/arkts/.*"
  - ".*/test/xts/acts/.*"
  - ".*/base/global/i18n/.*"
  - ".*/base/security/certificate_manager/.*"
  - ".*/distributeddatamgr/udmf/.*"
  - ".*/foundation/filemanagement/.*"
  - ".*/foundation/systemabilitymgr/.*"
  - ".*/developtools/ace_ets2bundle/.*"
  - ".*/test/testfwk/arkxtest/.*"
  - ".*/foundation/arkui/ace_engine/frameworks/.*"
  - ".*/foundation/arkui/ace_engine/advanced_ui_component_static/.*"
  - ".*/foundation/multimedia/av_session/.*"
  - ".*/ohos_ets/api/arkui/.*"
  - ".*/ohos_ets/arkts/.*"

- name: "override_field_allowed"
  paths:
  - ".*/arkui/ace_engine/.*"
  - ".*/ohos-sdk/.+/ets/static/api/.*"