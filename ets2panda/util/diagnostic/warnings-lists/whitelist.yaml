whitelist:
- name: "allow_xts"
  paths:
  - ".*/xts/acts/.*"
  - ".*/test/xts/.*"
  - ".*/ability/ability_runtime/.*"
  - ".*/window/window_manager/.*"
  - ".*/arkui/ace_engine/.*"
  - ".*/generated/.*"

- name: "ambient_context"
  paths:
  - ".*/api/@ohos\\.app\\.ability\\.AbilityConstant\\.d\\.ets"
  - ".*/api/@ohos\\.arkui\\.inspector\\.static\\.d\\.ets"
  - ".*/api/@ohos\\.data\\.cloudData\\.d\\.ets"
  - ".*/api/@ohos\\.file\\.fs\\.d\\.ets"
  - ".*/api/@ohos\\.hichecker\\.d\\.ets"
  - ".*/api/@ohos\\.inputMethodEngine\\.d\\.ets"
  - ".*/api/@ohos\\.multimedia\\.image\\.d\\.ets"
  - ".*/api/@ohos\\.nfc\\.tag\\.d\\.ets"
  - ".*/api/@ohos\\.pasteboard\\.d\\.ets"
  - ".*/api/@ohos\\.request\\.d\\.ets"
  - ".*/api/@ohos\\.userIAM\\.userAuth\\.d\\.ets"
  - ".*/kits/@kit\\.ArkUI\\.static\\.d\\.ets"
  - ".*/api/@ohos\\.app\\.ability\\.AbilityConstant\\.d\\.ts"
  - ".*/api/@ohos\\.data\\.cloudData\\.d\\.ts"
  - ".*/api/@ohos\\.file\\.fs\\.d\\.ts"
  - ".*/api/@ohos\\.hichecker\\.d\\.ts"
